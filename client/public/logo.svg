<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d0036;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6a003a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6eb4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e91e8c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6eb4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6eb4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background pill -->
  <rect width="400" height="120" rx="20" ry="20" fill="url(#bgGrad)" />

  <!-- Heart icon -->
  <g transform="translate(28, 30) scale(0.85)" filter="url(#glow)">
    <path d="M30 55 C10 38, 0 25, 0 15 C0 5, 8 0, 15 0 C20 0, 26 3, 30 8 C34 3, 40 0, 45 0 C52 0, 60 5, 60 15 C60 25, 50 38, 30 55 Z"
      fill="url(#heartGrad)" />
  </g>

  <!-- Subtle sparkles around heart -->
  <circle cx="20" cy="22" r="2" fill="#ff6eb4" opacity="0.7"/>
  <circle cx="72" cy="18" r="1.5" fill="#ffb3d9" opacity="0.6"/>
  <circle cx="65" cy="60" r="1.5" fill="#ff6eb4" opacity="0.5"/>

  <!-- Main brand name -->
  <text x="95" y="52"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="bold"
    fill="url(#textGrad)"
    filter="url(#glow)"
    letter-spacing="1">
    Sexsocialization
  </text>

  <!-- .COM badge -->
  <rect x="306" y="33" width="52" height="20" rx="10" fill="#e91e8c" opacity="0.85"/>
  <text x="332" y="47"
    font-family="Arial, sans-serif"
    font-size="11"
    font-weight="bold"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="0.5">
    .COM
  </text>

  <!-- Tagline -->
  <text x="95" y="75"
    font-family="Arial, sans-serif"
    font-size="11"
    fill="#ffb3d9"
    letter-spacing="0.8"
    opacity="0.9">
    Bridging distance with love 💝
  </text>

  <!-- 18+ badge -->
  <rect x="344" y="78" width="38" height="20" rx="6" fill="#ff006e" opacity="0.9"/>
  <text x="363" y="92"
    font-family="Arial, sans-serif"
    font-size="10"
    font-weight="bold"
    fill="#ffffff"
    text-anchor="middle">
    18+
  </text>

  <!-- Bottom divider line -->
  <line x1="95" y1="82" x2="338" y2="82" stroke="#e91e8c" stroke-width="0.5" opacity="0.4"/>
</svg>
